<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recrutamento Sem Lei.85</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* FUNDO ARENA FREE FIRE */
body{
    font-family: Arial, Helvetica, sans-serif;
    background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url("https://images.unsplash.com/photo-1542751371-adc38448a05e") no-repeat center center/cover;
    min-height:100vh;
    color:white;
    animation:arenaMove 20s ease-in-out infinite alternate;
}

/* Movimento suave no fundo */
@keyframes arenaMove{
    from{ background-size:110%; }
    to{ background-size:120%; }
}

/* HEADER */
header{
    background:rgba(0,0,0,0.85);
    padding:20px;
    text-align:center;
    border-bottom:2px solid #00f0ff;
    animation:fadeDown 1s ease forwards;
}

/* NOME RGB ANIMADO */
h1{
    font-size:32px;
    font-weight:bold;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rgbMove 6s linear infinite;
}

/* animação RGB */
@keyframes rgbMove{
    0%{ background-position:0%; }
    100%{ background-position:400%; }
}

/* MENU */
nav{
    margin-top:10px;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

nav a:hover{
    color:#00f0ff;
}

/* CONTEÚDO */
.conteudo{
    text-align:center;
    padding:100px 20px;
    opacity:0;
    transform:translateY(30px);
    animation:fadeUp 1s ease forwards;
    animation-delay:0.5s;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    font-size:28px;
    margin-bottom:20px;
}

/* BOTÃO NEON */
.botao{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    border-radius:8px;
    font-weight:bold;
    text-decoration:none;
    background:linear-gradient(90deg,#00f0ff,#0066ff);
    color:black;
    transition:0.3s;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{ box-shadow:0 0 10px #00f0ff; }
    50%{ box-shadow:0 0 30px #00f0ff; }
    100%{ box-shadow:0 0 10px #00f0ff; }
}

.botao:hover{
    transform:scale(1.1);
}

/* RESPONSIVO */
@media(max-width:768px){

    h1{
        font-size:24px;
    }

    nav a{
        display:block;
        margin:8px 0;
    }

    .conteudo{
        padding:60px 15px;
    }

    h2{
        font-size:22px;
    }
}

</style>
</head>

<body>

<header>
    <h1>SEM LEI.85</h1>
    <nav>
        <a href="#">Sobre</a>
        <a href="#">Recrutamento</a>
    </nav>
</header>

<section class="conteudo">
    <h2>Faça Parte da Elite</h2>
    <p>Se você é forte, corajoso e quer evoluir, clique abaixo:</p>

    <a class="botao" href="https://wa.me/5511914932723" target="_blank">
        Entrar pelo WhatsApp
    </a>
</section>

</body>
</html>
